name: Build and Push Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pyguy2000/clutch-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.sha.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homelab-gitops
        uses: actions/checkout@v4
        with:
          repository: PyGuy2000/homelab-gitops
          token: ${{ secrets.GITOPS_PAT }}

      - name: Update image tag in deployment
        run: |
          sed -i "s|image: ghcr.io/pyguy2000/clutch-dashboard:.*|image: ghcr.io/pyguy2000/clutch-dashboard:${{ needs.build-and-push.outputs.image-tag }}|" \
            apps/base/clutch-dashboard/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/base/clutch-dashboard/deployment.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update clutch-dashboard image to ${{ needs.build-and-push.outputs.image-tag }}"
          git push
